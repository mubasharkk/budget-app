name: Laravel

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
      with:
        php-version: '8.4'
        extensions: mbstring, dom, fileinfo, gd, bcmath, pdo_sqlite, sqlite3, pcov
        coverage: pcov
    - uses: actions/checkout@v4
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Generate key
      run: php artisan key:generate
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test --coverage-clover=build/logs/clover.xml
    - name: Generate coverage badge
      run: php bin/coverage-badge.php build/logs/clover.xml .github/badges/coverage.svg
    - name: Commit coverage badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        if [ -n "$(git status --porcelain .github/badges/coverage.svg)" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git commit -m "Update coverage badge [skip ci]"
          git push
        else
          echo "Coverage badge unchanged."
        fi
